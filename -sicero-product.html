/* ─── COMPONENTS ────────────────────────────────────────────── */
function Stars({rating, size=13}){
  return (
    <span style={{display:'inline-flex',gap:1}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i} style={{fontSize:size,color:i<=Math.round(rating)?'#D4AF37':'rgba(255,255,255,0.18)'}}>★</span>
      ))}
    </span>
  );
}

function ScoreRing({score, size=72}){
  const r=(size/2)-6, circ=2*Math.PI*r, dash=(score/100)*circ;
  const color=score>=90?'#D4AF37':score>=80?'#60a5fa':'#4ade80';
  return (
    <div style={{position:'relative',width:size,height:size,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width={size} height={size} style={{position:'absolute',transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 6px ${color}90)`,transition:'stroke-dasharray 1s ease'}}/>
      </svg>
      <div style={{textAlign:'center',position:'relative'}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:size*0.28,fontWeight:800,color,lineHeight:1}}>{score}</div>
        <div style={{fontSize:size*0.12,color:'rgba(255,255,255,0.35)',marginTop:2,textTransform:'uppercase',letterSpacing:'0.06em'}}>Score</div>
      </div>
    </div>
  );
}

function PriceBar({listings}){
  const min=Math.min(...listings.map(l=>l.price));
  const max=Math.max(...listings.map(l=>l.price))+50;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {listings.map((l,i)=>{
        const pct=((l.price-min)/(max-min))*60+5;
        return (
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,opacity:l.inStock?1:0.45}}>
            <div style={{width:80,fontSize:11,color:'rgba(255,255,255,0.5)',flexShrink:0}}>{l.logo} {l.store}</div>
            <div style={{flex:1,height:6,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${100-pct}%`,background:i===0?'linear-gradient(90deg,#D4AF37,#f59e0b)':'rgba(255,255,255,0.2)',borderRadius:3,transition:'width 1.2s ease'}}/>
            </div>
            <div style={{fontSize:12,fontWeight:700,color:l.price===min?'#D4AF37':'rgba(255,255,255,0.6)',width:54,textAlign:'right',flexShrink:0}}>${l.price.toLocaleString()}</div>
          </div>
        );
      })}
    </div>
  );
}

function CheckoutModal({listing, onClose}){
  const [step,setStep]=useState(0);
  const steps=[
    {label:'Authenticating listing',icon:'🔍'},
    {label:'Finding cheapest fulfillment route',icon:'🗺'},
    {label:'Placing order on '+listing.store,icon:'🛒'},
    {label:'Order confirmed!',icon:'✅'},
  ];
  useEffect(()=>{
    if(step<3){const t=setTimeout(()=>setStep(s=>s+1),900);return()=>clearTimeout(t);}
  },[step]);
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(4,6,18,0.92)',backdropFilter:'blur(18px)',display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.2s ease'}}>
      <div style={{background:'linear-gradient(145deg,rgba(16,18,42,0.99),rgba(10,12,28,0.99))',border:'1px solid rgba(212,175,55,0.22)',borderRadius:22,padding:'36px 40px',width:460,maxWidth:'92vw',boxShadow:'0 50px 120px rgba(0,0,0,0.7)',animation:'popIn 0.3s ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:28}}>
          <div>
            <div style={{fontSize:10,color:'rgba(212,175,55,0.65)',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:5,fontFamily:"'DM Mono',monospace"}}>Sicero Checkout</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:'#fff',marginBottom:3}}>{PRODUCT.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:26,fontWeight:800,color:'#D4AF37'}}>${listing.price.toLocaleString()}</span>
              <span style={{fontSize:13,color:'rgba(255,255,255,0.3)',textDecoration:'line-through'}}>${listing.orig.toLocaleString()}</span>
              <span style={{fontSize:11,color:'#4ade80',fontWeight:700,background:'rgba(74,222,128,0.1)',padding:'2px 7px',borderRadius:5}}>Save ${listing.orig-listing.price}</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.45)',cursor:'pointer',borderRadius:9,padding:'7px 12px',fontSize:15,fontFamily:'inherit',transition:'all 0.2s'}}
            onMouseEnter={e=>{e.target.style.background='rgba(255,255,255,0.1)';e.target.style.color='#fff';}}
            onMouseLeave={e=>{e.target.style.background='rgba(255,255,255,0.06)';e.target.style.color='rgba(255,255,255,0.45)';}}>✕</button>
        </div>

        <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:12,padding:'14px 16px',marginBottom:24,display:'flex',justifyContent:'space-between',fontSize:12,color:'rgba(255,255,255,0.45)'}}>
          <span>Fulfilling from <strong style={{color:'rgba(255,255,255,0.75)'}}>{listing.store}</strong></span>
          <span>Delivery: <strong style={{color:'rgba(255,255,255,0.75)'}}>{listing.delivery}</strong></span>
          <span>{listing.shipping==='Free'?<span style={{color:'#4ade80'}}>Free shipping</span>:<span>+{listing.shipping}</span>}</span>
        </div>

        <div style={{marginBottom:24}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:13,marginBottom:14,transition:'opacity 0.4s',opacity:i<=step?1:0.25}}>
              <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,
                background:i<step?'linear-gradient(135deg,#D4AF37,#B8960C)':i===step?'rgba(212,175,55,0.12)':'rgba(255,255,255,0.04)',
                border:i===step?'1px solid rgba(212,175,55,0.45)':i<step?'none':'1px solid rgba(255,255,255,0.08)',
                boxShadow:i<step?'0 0 12px rgba(212,175,55,0.3)':'none',
                transition:'all 0.5s ease',
              }}>
                {i<step?'✓':i===step?<span style={{fontSize:10,animation:'pulse 1s infinite',display:'inline-block'}}>●</span>:i+1}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:i===step?600:400,color:i<step?'#4ade80':i===step?'#fff':'rgba(255,255,255,0.3)',transition:'color 0.3s'}}>{s.label}</div>
                {i===step&&step<3&&<div style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:2,animation:'pulse 1.5s infinite'}}>Processing…</div>}
              </div>
            </div>
          ))}
        </div>

        {step===3&&(
          <div style={{background:'linear-gradient(135deg,rgba(74,222,128,0.08),rgba(74,222,128,0.04))',border:'1px solid rgba(74,222,128,0.2)',borderRadius:14,padding:'18px 20px',textAlign:'center',animation:'popIn 0.4s ease'}}>
            <div style={{fontSize:32,marginBottom:8}}>🎉</div>
            <div style={{fontSize:16,fontWeight:700,color:'#4ade80',marginBottom:5}}>Order Placed Successfully</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,0.4)',lineHeight:1.6}}>Sicero fulfilled your order from <strong style={{color:'rgba(255,255,255,0.6)'}}>{listing.store}</strong>.<br/>Estimated delivery: <strong style={{color:'rgba(255,255,255,0.6)'}}>{listing.delivery}</strong>. Check your email for tracking.</div>
          </div>
        )}

        <div style={{marginTop:20,paddingTop:14,borderTop:'1px solid rgba(255,255,255,0.05)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:10.5,color:'rgba(255,255,255,0.2)',fontFamily:"'DM Mono',monospace"}}>Sicero earns a small margin · You get the best price</div>
          <div style={{fontSize:10.5,color:'rgba(212,175,55,0.45)'}}>🔒 Secured</div>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN PAGE ─────────────────────────────────────────────── */

            {alertSet?'🔔 Alert Set':'🔔 Price Alert'}
          </button>
          <button style={{padding:'7px 16px',background:'linear-gradient(135deg,#D4AF37,#B8960C)',border:'none',borderRadius:9,color:'#0a0c1c',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Sign In</button>
        </div>

      {/* ── BODY ── */}

              <div style={{position:'absolute',top:16,left:16,display:'flex',gap:8}}>

                      <img src={p.img} alt={p.name} style={{width:'100%',height:'100%',objectFit:'cover',opacity:0.8}}/>
                      <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(8,10,26,0.7) 0%,transparent 50%)'}}/>
                      <div style={{position:'absolute',top:10,left:10,padding:'3px 8px',borderRadius:6,background:'rgba(212,175,55,0.15)',border:'1px solid rgba(212,175,55,0.3)',fontSize:10,fontWeight:700,color:'#D4AF37'}}>{p.label}</div>
                    </div>
                    <div style={{padding:'14px 16px'}}>
                      <div style={{fontSize:13.5,fontWeight:600,color:'rgba(255,255,255,0.85)',marginBottom:8,lineHeight:1.3}}>{p.name}</div>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <span style={{fontSize:18,fontWeight:800,color:'#D4AF37',fontFamily:"'Syne',sans-serif"}}>${p.price.toLocaleString()}</span>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontSize:10,color:'rgba(255,255,255,0.3)'}}>Score</span>
                          <span style={{fontSize:13,fontWeight:800,color:'#D4AF37'}}>{p.score}</span>
                        </div>
                      </div>
                      <button style={{marginTop:10,width:'100%',padding:'8px',borderRadius:9,background:'rgba(212,175,55,0.08)',border:'1px solid rgba(212,175,55,0.2)',color:'#D4AF37',fontWeight:600,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='rgba(212,175,55,0.15)';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='rgba(212,175,55,0.08)';}}>View Product →</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {checkout&&<CheckoutModal listing={checkout} onClose={()=>setCheckout(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
